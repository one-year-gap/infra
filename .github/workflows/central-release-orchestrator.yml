name: central-release-orchestrator

on:
  workflow_call:
    inputs:
      source-repo:
        description: "owner/repo"
        required: true
        type: string
      source-sha:
        description: "merged commit sha on main"
        required: true
        type: string
    secrets:
      CENTRAL_REPO_TOKEN:
        required: true
      AWS_REGION:
        required: true
      CDK_DEFAULT_ACCOUNT:
        required: true
      AWS_DEPLOY_ROLE_ARN:
        required: true
      ADMIN_ALLOWED_CIDRS:
        required: true
      ADMIN_WEB_PORT:
        required: true
      CUSTOMER_WEB_PORT:
        required: true
      ADMIN_SERVER_PORT:
        required: true
      CUSTOMER_SERVER_PORT:
        required: true
      ADMIN_WEB_REPOSITORY:
        required: true
      API_SERVER_REPOSITORY:
        required: true
      WORKER_REPOSITORY:
        required: false
      WORKER_TASK_DEFINITION_ARN:
        required: false
      WORKER_TASK_DEFINITION_FAMILY:
        required: false
      WORKER_CONTAINER_NAME:
        required: false
      WORKER_CLUSTER_NAME:
        required: false
      WORKER_SUBNET_IDS:
        required: false
      WORKER_SECURITY_GROUP_IDS:
        required: false
      WORKER_ASSIGN_PUBLIC_IP:
        required: false
      COUNSELING_ANALYTICS_REPOSITORY:
        required: false
      COUNSELING_ANALYTICS_TASK_DEFINITION_ARN:
        required: false
      COUNSELING_ANALYTICS_TASK_DEFINITION_FAMILY:
        required: false
      COUNSELING_ANALYTICS_CONTAINER_NAME:
        required: false
      COUNSELING_ANALYTICS_CLUSTER_NAME:
        required: false
      COUNSELING_ANALYTICS_SERVICE_NAME:
        required: false
      DOMAIN_NAME:
        required: true
      VERCEL_APEX_IP:
        required: true
      DOMAIN_INTERNAL_NAME:
        required: true
      CUSTOMER_CERT_ARN:
        required: true
      ADMIN_CERT_ARN:
        required: true
      ADMIN_API_RUNTIME_SECRET_ARN:
        required: false
      CUSTOMER_API_RUNTIME_SECRET_ARN:
        required: false
      ADMIN_API_SECRETS_MANAGER_ARNS:
        required: false
      CUSTOMER_API_SECRETS_MANAGER_ARNS:
        required: false
      ADMIN_API_RUNTIME_SECRET_KMS_KEY_ARN:
        required: false
      CUSTOMER_API_RUNTIME_SECRET_KMS_KEY_ARN:
        required: false
      ADMIN_API_RUNTIME_SECRET_KMS_KEY_ARNS:
        required: false
      CUSTOMER_API_RUNTIME_SECRET_KMS_KEY_ARNS:
        required: false

  repository_dispatch:
    types: [release-request]

  workflow_dispatch:
    inputs:
      source-repo:
        description: "owner/repo"
        required: true
        default: "one-year-gap/api-server"
        type: string
      source-sha:
        description: "target sha (empty = HEAD of default branch)"
        required: false
        default: ""
        type: string
      release-label:
        description: "release label"
        required: true
        type: choice
        options:
          - release:major
          - release:minor
          - release:patch
      deploy-labels:
        description: "comma-separated deploy labels (ex: deploy:api-server,deploy:admin-web,deploy:worker,deploy:recommendation-server)"
        required: true
        default: "deploy:api-server"
        type: string

permissions:
  contents: write
  pull-requests: read
  id-token: write

concurrency:
  group: central-release-tag-creation
  cancel-in-progress: false

env:
  # Required AWS/Auth
  AWS_REGION: ${{ secrets.AWS_REGION }}
  CDK_DEFAULT_ACCOUNT: ${{ secrets.CDK_DEFAULT_ACCOUNT }}
  AWS_DEPLOY_ROLE_ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
  # Required CDK app envs
  REGION: ${{ secrets.AWS_REGION }}
  ADMIN_ALLOWED_CIDRS: ${{ secrets.ADMIN_ALLOWED_CIDRS }}
  ADMIN_WEB_PORT: ${{ secrets.ADMIN_WEB_PORT }}
  CUSTOMER_WEB_PORT: ${{ secrets.CUSTOMER_WEB_PORT }}
  ADMIN_SERVER_PORT: ${{ secrets.ADMIN_SERVER_PORT }}
  CUSTOMER_SERVER_PORT: ${{ secrets.CUSTOMER_SERVER_PORT }}
  ADMIN_WEB_REPOSITORY: ${{ secrets.ADMIN_WEB_REPOSITORY }}
  API_SERVER_REPOSITORY: ${{ secrets.API_SERVER_REPOSITORY }}
  WORKER_REPOSITORY: ${{ secrets.WORKER_REPOSITORY }}
  WORKER_TASK_DEFINITION_ARN: ${{ secrets.WORKER_TASK_DEFINITION_ARN }}
  WORKER_TASK_DEFINITION_FAMILY: ${{ secrets.WORKER_TASK_DEFINITION_FAMILY }}
  WORKER_CONTAINER_NAME: ${{ secrets.WORKER_CONTAINER_NAME }}
  WORKER_CLUSTER_NAME: ${{ secrets.WORKER_CLUSTER_NAME }}
  WORKER_SUBNET_IDS: ${{ secrets.WORKER_SUBNET_IDS }}
  WORKER_SECURITY_GROUP_IDS: ${{ secrets.WORKER_SECURITY_GROUP_IDS }}
  WORKER_ASSIGN_PUBLIC_IP: ${{ secrets.WORKER_ASSIGN_PUBLIC_IP }}
  # 기본값은 비활성(빈 값)로 두고, 필요할 때만 secret 값을 true로 설정해 CI worker 실행을 켠다.
  CI_RUN_WORKER_TASK: ${{ secrets.CI_RUN_WORKER_TASK }}
  COUNSELING_ANALYTICS_REPOSITORY: ${{ secrets.COUNSELING_ANALYTICS_REPOSITORY }}
  COUNSELING_ANALYTICS_TASK_DEFINITION_ARN: ${{ secrets.COUNSELING_ANALYTICS_TASK_DEFINITION_ARN }}
  COUNSELING_ANALYTICS_TASK_DEFINITION_FAMILY: ${{ secrets.COUNSELING_ANALYTICS_TASK_DEFINITION_FAMILY }}
  COUNSELING_ANALYTICS_CONTAINER_NAME: ${{ secrets.COUNSELING_ANALYTICS_CONTAINER_NAME }}
  COUNSELING_ANALYTICS_CLUSTER_NAME: ${{ secrets.COUNSELING_ANALYTICS_CLUSTER_NAME }}
  COUNSELING_ANALYTICS_SERVICE_NAME: ${{ secrets.COUNSELING_ANALYTICS_SERVICE_NAME }}
  DOMAIN_NAME: ${{ secrets.DOMAIN_NAME }}
  VERCEL_APEX_IP: ${{ secrets.VERCEL_APEX_IP }}
  DOMAIN_INTERNAL_NAME: ${{ secrets.DOMAIN_INTERNAL_NAME }}
  CUSTOMER_CERT_ARN: ${{ secrets.CUSTOMER_CERT_ARN }}
  ADMIN_CERT_ARN: ${{ secrets.ADMIN_CERT_ARN }}
  ADMIN_API_RUNTIME_SECRET_ARN: ${{ secrets.ADMIN_API_RUNTIME_SECRET_ARN }}
  CUSTOMER_API_RUNTIME_SECRET_ARN: ${{ secrets.CUSTOMER_API_RUNTIME_SECRET_ARN }}
  ADMIN_API_SECRETS_MANAGER_ARNS: ${{ secrets.ADMIN_API_SECRETS_MANAGER_ARNS }}
  CUSTOMER_API_SECRETS_MANAGER_ARNS: ${{ secrets.CUSTOMER_API_SECRETS_MANAGER_ARNS }}
  ADMIN_API_RUNTIME_SECRET_KMS_KEY_ARN: ${{ secrets.ADMIN_API_RUNTIME_SECRET_KMS_KEY_ARN }}
  CUSTOMER_API_RUNTIME_SECRET_KMS_KEY_ARN: ${{ secrets.CUSTOMER_API_RUNTIME_SECRET_KMS_KEY_ARN }}
  ADMIN_API_RUNTIME_SECRET_KMS_KEY_ARNS: ${{ secrets.ADMIN_API_RUNTIME_SECRET_KMS_KEY_ARNS }}
  CUSTOMER_API_RUNTIME_SECRET_KMS_KEY_ARNS: ${{ secrets.CUSTOMER_API_RUNTIME_SECRET_KMS_KEY_ARNS }}
  # Source repos
  API_SERVER_SOURCE_REPO: one-year-gap/api-server
  ADMIN_WEB_SOURCE_REPO: one-year-gap/admin-fe
  WORKER_SOURCE_REPO: one-year-gap/worker
  COUNSELING_ANALYTICS_SOURCE_REPO: one-year-gap/counseling-analytics

jobs:
  resolve-context:
    runs-on: ubuntu-latest
    outputs:
      source_repo_code: ${{ steps.resolve.outputs.source_repo_code }}
      source_sha: ${{ steps.resolve.outputs.source_sha }}
      release_label: ${{ steps.resolve.outputs.release_label }}
      release_level: ${{ steps.resolve.outputs.release_level }}
      tag_namespace: ${{ steps.resolve.outputs.tag_namespace }}
      deploy_api_server: ${{ steps.resolve.outputs.deploy_api_server }}
      deploy_admin_web: ${{ steps.resolve.outputs.deploy_admin_web }}
      deploy_customer_web: ${{ steps.resolve.outputs.deploy_customer_web }}
      deploy_worker: ${{ steps.resolve.outputs.deploy_worker }}
      deploy_counseling_analytics: ${{ steps.resolve.outputs.deploy_counseling_analytics }}
      deploy_recommendation_realtime: ${{ steps.resolve.outputs.deploy_recommendation_realtime }}
      deploy_counseling_batch: ${{ steps.resolve.outputs.deploy_counseling_batch }}
      can_deploy_counseling_service: ${{ steps.resolve.outputs.can_deploy_counseling_service }}
      ci_run_worker_task: ${{ steps.resolve.outputs.ci_run_worker_task }}
    steps:
      - name: Resolve source + labels
        id: resolve
        uses: actions/github-script@v7
        env:
          IN_SOURCE_REPO: ${{ inputs.source-repo }}
          IN_SOURCE_SHA: ${{ inputs.source-sha }}
          IN_RELEASE_LABEL: ${{ inputs.release-label }}
          IN_DEPLOY_LABELS: ${{ inputs.deploy-labels }}
        with:
          github-token: ${{ secrets.CENTRAL_REPO_TOKEN }}
          script: |
            const releaseAllowed = ["release:major", "release:minor", "release:patch"];
            const deployAllowed  = [
              "deploy:admin-web",
              "deploy:api-server",
              "deploy:customer-web",
              "deploy:worker",
              "deploy:counseling-analytics",
              "deploy:recommendation-realtime",
              "deploy:counseling-batch",
              "deploy:recommendation-server",
              "deploy:analysis-server"
            ];

            function splitRepo(full) {
              const parts = String(full || "").trim().split("/");
              if (parts.length !== 2 || !parts[0] || !parts[1]) {
                throw new Error(`invalid source-repo: ${full}`);
              }
              return { owner: parts[0], repo: parts[1], full: `${parts[0]}/${parts[1]}` };
            }

            function parseDeployLabels(raw) {
              return String(raw || "")
                .split(",")
                .map(v => v.trim())
                .filter(Boolean);
            }

            function canonicalSourceRepoName(repoName) {
              if (repoName === "counseling-analytics" || repoName === "intelligence-server") {
                return "counseling-analytics";
              }
              return repoName;
            }

            function resolveTagNamespace(repoName, deployLabels) {
              if (repoName !== "counseling-analytics") {
                return "";
              }

              const hasLegacyNamespace = deployLabels.includes("deploy:counseling-analytics");
              const hasRecommendationNamespace = deployLabels.some(label =>
                label === "deploy:recommendation-server" || label === "deploy:recommendation-realtime"
              );
              const hasAnalysisNamespace = deployLabels.some(label =>
                label === "deploy:analysis-server" || label === "deploy:counseling-batch"
              );

              const namespaceCount = [
                hasLegacyNamespace,
                hasRecommendationNamespace,
                hasAnalysisNamespace,
              ].filter(Boolean).length;

              if (namespaceCount !== 1) {
                throw new Error(
                  "counseling-analytics release must resolve to exactly one namespace. " +
                    "use one of deploy:analysis-server/deploy:counseling-batch, " +
                    "deploy:recommendation-server/deploy:recommendation-realtime, or deploy:counseling-analytics"
                );
              }

              if (hasRecommendationNamespace) {
                return "recommendation-server";
              }
              if (hasAnalysisNamespace) {
                return "analysis-server";
              }
              return "counseling-analytics";
            }

            function resolveSourceRepoCode(repoName) {
              switch (repoName) {
                case "api-server":
                  return "repo1";
                case "admin-fe":
                  return "repo2";
                case "worker":
                  return "repo3";
                case "counseling-analytics":
                case "intelligence-server":
                  return "repo4";
                default:
                  throw new Error(`unsupported source repo name: ${repoName}`);
              }
            }

            let sourceRepo;
            let sourceSha;
            let releaseLabel;
            let deployLabels = [];
            const centralRepo = `${context.repo.owner}/${context.repo.repo}`;

            if (context.eventName === "workflow_dispatch") {
              sourceRepo   = process.env.IN_SOURCE_REPO;
              sourceSha    = process.env.IN_SOURCE_SHA;
              releaseLabel = process.env.IN_RELEASE_LABEL;
              deployLabels = parseDeployLabels(process.env.IN_DEPLOY_LABELS);

            } else if (context.eventName === "workflow_call") {
              sourceRepo = process.env.IN_SOURCE_REPO;
              sourceSha  = process.env.IN_SOURCE_SHA;
              // workflow_call은 PR 라벨 자동 감지 경로로 진입하므로 sourceSha 필수

            } else if (context.eventName === "repository_dispatch") {
              sourceRepo = context.payload.client_payload?.source_repo;
              sourceSha  = context.payload.client_payload?.source_sha;

            } else {
              throw new Error(`unsupported event: ${context.eventName}`);
            }

            sourceRepo = String(sourceRepo || "").trim();
            sourceSha = sourceSha ? String(sourceSha).trim() : "";

            if (!sourceRepo) {
              throw new Error("source-repo is empty in event payload/input");
            }

            let { owner, repo, full } = splitRepo(sourceRepo);

            if (sourceSha) {
              const candidateRepos = Array.from(new Set([
                full,
                process.env.API_SERVER_SOURCE_REPO,
                process.env.ADMIN_WEB_SOURCE_REPO,
                process.env.WORKER_SOURCE_REPO,
                process.env.COUNSELING_ANALYTICS_SOURCE_REPO
              ].filter(Boolean).map(v => String(v).trim())));

              let matchedRepo = null;
              for (const candidate of candidateRepos) {
                const c = splitRepo(candidate);
                try {
                  await github.rest.repos.getCommit({
                    owner: c.owner,
                    repo: c.repo,
                    ref: sourceSha
                  });
                  matchedRepo = c.full;
                  break;
                } catch (e) {
                  if (e.status !== 404 && e.status !== 422) throw e;
                }
              }

              if (!matchedRepo) {
                throw new Error(`source-sha not found. source_sha=${sourceSha}, candidates=${candidateRepos.join(",")}`);
              }

              if (matchedRepo !== full) {
                core.notice(`source_repo corrected by SHA lookup: ${full} -> ${matchedRepo}`);
                ({ owner, repo, full } = splitRepo(matchedRepo));
              }
            }

            if (context.eventName === "repository_dispatch" && full === centralRepo) {
              core.warning(`source_repo resolved to central repo(${centralRepo}). Verify sender dispatch payload.`);
            }

            if (!releaseLabel || deployLabels.length === 0) {
              if (!sourceSha) {
                throw new Error("source-sha is required when labels are not manually provided");
              }

              const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                owner,
                repo,
                commit_sha: sourceSha
              });

              const mergedToMain = prs.data
                .filter(pr => pr.merged_at && pr.base?.ref === "main")
                .sort((a, b) => new Date(b.merged_at) - new Date(a.merged_at));

              const pr = mergedToMain[0] || prs.data[0];
              if (!pr) {
                throw new Error(`No associated PR found for ${full}@${sourceSha}`);
              }

              const labels  = (pr.labels || []).map(l => l.name);
              const release = labels.filter(l => releaseAllowed.includes(l));
              const deploy  = labels.filter(l => deployAllowed.includes(l));

              if (release.length !== 1) {
                throw new Error(`release label must be exactly one. found=${release.join(",") || "none"}`);
              }
              if (deploy.length < 1) {
                throw new Error("at least one deploy label is required");
              }

              releaseLabel = release[0];
              deployLabels = deploy;
            }

            if (!releaseAllowed.includes(releaseLabel)) {
              throw new Error(`invalid release label: ${releaseLabel}`);
            }
            for (const label of deployLabels) {
              if (!deployAllowed.includes(label)) {
                throw new Error(`invalid deploy label: ${label}`);
              }
            }
            if (deployLabels.includes("deploy:customer-web")) {
              throw new Error("deploy:customer-web is manual only. use customer-web-manual-release workflow");
            }

            const releaseLevel = releaseLabel.replace("release:", "");
            const sourceRepoKey = canonicalSourceRepoName(repo);
            const sourceRepoCode = resolveSourceRepoCode(sourceRepoKey);
            const tagNamespace = resolveTagNamespace(sourceRepoKey, deployLabels);

            core.setOutput("source_repo_code", sourceRepoCode);
            core.setOutput("source_sha",        sourceSha || "");
            core.setOutput("release_label",     releaseLabel);
            core.setOutput("release_level",     releaseLevel);
            core.setOutput("tag_namespace",     tagNamespace);
            core.setOutput("deploy_api_server", deployLabels.includes("deploy:api-server") ? "true" : "false");
            core.setOutput("deploy_admin_web", deployLabels.includes("deploy:admin-web") ? "true" : "false");
            core.setOutput("deploy_customer_web", deployLabels.includes("deploy:customer-web") ? "true" : "false");
            core.setOutput("deploy_worker", deployLabels.includes("deploy:worker") ? "true" : "false");
            core.setOutput("deploy_counseling_analytics", deployLabels.includes("deploy:counseling-analytics") ? "true" : "false");
            core.setOutput(
              "deploy_recommendation_realtime",
              (
                deployLabels.includes("deploy:recommendation-server") ||
                deployLabels.includes("deploy:recommendation-realtime") ||
                deployLabels.includes("deploy:counseling-analytics")
              ) ? "true" : "false"
            );
            core.setOutput(
              "deploy_counseling_batch",
              (
                deployLabels.includes("deploy:analysis-server") ||
                deployLabels.includes("deploy:counseling-batch")
              ) ? "true" : "false"
            );
            core.setOutput(
              "can_deploy_counseling_service",
              (
                process.env.COUNSELING_ANALYTICS_CLUSTER_NAME &&
                process.env.COUNSELING_ANALYTICS_SERVICE_NAME &&
                (process.env.COUNSELING_ANALYTICS_TASK_DEFINITION_ARN || process.env.COUNSELING_ANALYTICS_TASK_DEFINITION_FAMILY)
              ) ? "true" : "false"
            );
            core.setOutput(
              "ci_run_worker_task",
              String(process.env.CI_RUN_WORKER_TASK || "").trim().toLowerCase() === "true" ? "true" : "false"
            );

  create-tag:
    runs-on: ubuntu-latest
    needs: [resolve-context]
    if: needs.resolve-context.result == 'success' && needs.resolve-context.outputs.source_repo_code != ''
    outputs:
      version_tag: ${{ steps.bump.outputs.version_tag }}
      target_sha:  ${{ steps.bump.outputs.target_sha }}
    steps:
      - name: Guard required outputs
        id: guard-source
        shell: bash
        env:
          SOURCE_REPO_CODE: ${{ needs.resolve-context.outputs.source_repo_code }}
          API_SERVER_SOURCE_REPO: ${{ env.API_SERVER_SOURCE_REPO }}
          ADMIN_WEB_SOURCE_REPO: ${{ env.ADMIN_WEB_SOURCE_REPO }}
          WORKER_SOURCE_REPO: ${{ env.WORKER_SOURCE_REPO }}
          COUNSELING_ANALYTICS_SOURCE_REPO: ${{ env.COUNSELING_ANALYTICS_SOURCE_REPO }}
          SOURCE_SHA: ${{ needs.resolve-context.outputs.source_sha }}
        run: |
          set -euo pipefail
          case "${SOURCE_REPO_CODE}" in
            repo1) SOURCE_REPO="${API_SERVER_SOURCE_REPO}" ;;
            repo2) SOURCE_REPO="${ADMIN_WEB_SOURCE_REPO}" ;;
            repo3) SOURCE_REPO="${WORKER_SOURCE_REPO}" ;;
            repo4) SOURCE_REPO="${COUNSELING_ANALYTICS_SOURCE_REPO}" ;;
            *)
              echo "::error::resolve-context output source_repo_code is invalid. source_repo_code=${SOURCE_REPO_CODE}"
              exit 1
              ;;
          esac
          if [ -z "${SOURCE_REPO}" ] || [[ "${SOURCE_REPO}" != */* ]]; then
            echo "::error::resolve-context output source_repo is empty/invalid. Aborting to prevent checkout fallback to current repo."
            exit 1
          fi
          echo "source_repo=${SOURCE_REPO}" >> "$GITHUB_OUTPUT"
          echo "resolved-source-repo=$SOURCE_REPO"
          echo "resolved-source-sha=${SOURCE_SHA:-<empty>}"

      - name: Checkout source repo (at source sha)
        if: needs.resolve-context.outputs.source_sha != ''
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.guard-source.outputs.source_repo }}
          ref: ${{ needs.resolve-context.outputs.source_sha }}
          token: ${{ secrets.CENTRAL_REPO_TOKEN }}
          fetch-depth: 0

      - name: Checkout source repo (default branch)
        if: needs.resolve-context.outputs.source_sha == ''
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.guard-source.outputs.source_repo }}
          token: ${{ secrets.CENTRAL_REPO_TOKEN }}
          fetch-depth: 0

      - name: Validate source context
        shell: bash
        env:
          SOURCE_REPO: ${{ steps.guard-source.outputs.source_repo }}
          SOURCE_SHA: ${{ needs.resolve-context.outputs.source_sha }}
        run: |
          set -euo pipefail
          echo "source-repo=$SOURCE_REPO"
          echo "source-sha=${SOURCE_SHA:-<empty>}"
          if [ -n "${SOURCE_SHA}" ]; then
            git cat-file -e "${SOURCE_SHA}^{commit}" || {
              echo "::error::source-sha does not exist in source-repo. source-repo=$SOURCE_REPO source-sha=$SOURCE_SHA"
              exit 1
            }
          fi

      - name: Bump semver and push tag
        id: bump
        shell: bash
        env:
          RELEASE_LEVEL: ${{ needs.resolve-context.outputs.release_level }}
          TAG_NAMESPACE: ${{ needs.resolve-context.outputs.tag_namespace }}
          SOURCE_SHA:    ${{ needs.resolve-context.outputs.source_sha }}
        run: |
          set -euo pipefail

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          TARGET_SHA="$SOURCE_SHA"
          if [ -z "$TARGET_SHA" ]; then
            TARGET_SHA="$(git rev-parse HEAD)"
          fi

          
          OBJECT_TYPE="$(git cat-file -t "$TARGET_SHA" 2>/dev/null || echo 'missing')"
          if [ "$OBJECT_TYPE" != "commit" ]; then
            echo "::error::TARGET_SHA=$TARGET_SHA is not a commit (type=$OBJECT_TYPE). Check that source-sha belongs to this repository." >&2
            exit 1
          fi

          LEGACY_TAG_PATTERN='v[0-9]*.[0-9]*.[0-9]*'
          if [ -n "${TAG_NAMESPACE:-}" ]; then
            TAG_PATTERN="${TAG_NAMESPACE}-v[0-9]*.[0-9]*.[0-9]*"
            LATEST_TAG="$(git tag -l "$TAG_PATTERN" --sort=-v:refname | head -n1)"

            # analysis-server inherits the legacy counseling-analytics version line.
            if [ -z "$LATEST_TAG" ]; then
              case "$TAG_NAMESPACE" in
                analysis-server|counseling-analytics)
                  LATEST_TAG="$(git tag -l "$LEGACY_TAG_PATTERN" --sort=-v:refname | head -n1)"
                  ;;
              esac
            fi

            if [ -z "$LATEST_TAG" ]; then
              LATEST_TAG="${TAG_NAMESPACE}-v0.0.0"
            fi

            BASE="${LATEST_TAG##*-v}"
            if [ "$BASE" = "$LATEST_TAG" ]; then
              BASE="${LATEST_TAG#v}"
            fi
          else
            LATEST_TAG="$(git tag -l "$LEGACY_TAG_PATTERN" --sort=-v:refname | head -n1)"
            if [ -z "$LATEST_TAG" ]; then
              LATEST_TAG="v0.0.0"
            fi
            BASE="${LATEST_TAG#v}"
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE"

          case "$RELEASE_LEVEL" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
            *)
              echo "Unsupported RELEASE_LEVEL=$RELEASE_LEVEL" >&2
              exit 1
              ;;
          esac

          if [ -n "${TAG_NAMESPACE:-}" ]; then
            NEXT_TAG="${TAG_NAMESPACE}-v${MAJOR}.${MINOR}.${PATCH}"
          else
            NEXT_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          fi

          if git rev-parse "$NEXT_TAG" >/dev/null 2>&1; then
            echo "::error::Tag already exists: $NEXT_TAG" >&2
            exit 1
          fi

          git tag -a "$NEXT_TAG" "$TARGET_SHA" -m "release: $NEXT_TAG"
          git push origin "$NEXT_TAG"

          echo "version_tag=$NEXT_TAG" >> "$GITHUB_OUTPUT"
          echo "target_sha=$TARGET_SHA" >> "$GITHUB_OUTPUT"

  create-github-release:
    runs-on: ubuntu-latest
    needs: [resolve-context, create-tag]
    steps:
      - name: Create GitHub Release (source repo)
        uses: actions/github-script@v7
        env:
          SOURCE_REPO_CODE:   ${{ needs.resolve-context.outputs.source_repo_code }}
          API_SERVER_SOURCE_REPO: ${{ env.API_SERVER_SOURCE_REPO }}
          ADMIN_WEB_SOURCE_REPO: ${{ env.ADMIN_WEB_SOURCE_REPO }}
          WORKER_SOURCE_REPO: ${{ env.WORKER_SOURCE_REPO }}
          COUNSELING_ANALYTICS_SOURCE_REPO: ${{ env.COUNSELING_ANALYTICS_SOURCE_REPO }}
          VERSION_TAG:        ${{ needs.create-tag.outputs.version_tag }}
          TARGET_SHA:         ${{ needs.create-tag.outputs.target_sha }}
          RELEASE_LABEL:      ${{ needs.resolve-context.outputs.release_label }}
          TAG_NAMESPACE:      ${{ needs.resolve-context.outputs.tag_namespace }}
          DEPLOY_API_SERVER: ${{ needs.resolve-context.outputs.deploy_api_server }}
          DEPLOY_ADMIN_WEB: ${{ needs.resolve-context.outputs.deploy_admin_web }}
          DEPLOY_CUSTOMER_WEB: ${{ needs.resolve-context.outputs.deploy_customer_web }}
          DEPLOY_WORKER: ${{ needs.resolve-context.outputs.deploy_worker }}
          DEPLOY_COUNSELING_ANALYTICS: ${{ needs.resolve-context.outputs.deploy_counseling_analytics }}
          DEPLOY_RECOMMENDATION_REALTIME: ${{ needs.resolve-context.outputs.deploy_recommendation_realtime }}
          DEPLOY_COUNSELING_BATCH: ${{ needs.resolve-context.outputs.deploy_counseling_batch }}
        with:
          github-token: ${{ secrets.CENTRAL_REPO_TOKEN }}
          retries: 3
          script: |
            const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));
            const sourceRepoSelector = String(
              process.env.SOURCE_REPO_CODE ||
              process.env.SOURCE_REPO_KEY ||
              process.env.SOURCE_REPO_NAME ||
              ""
            ).trim();
            const sourceRepoMap = {
              repo1: process.env.API_SERVER_SOURCE_REPO,
              "api-server": process.env.API_SERVER_SOURCE_REPO,
              repo2: process.env.ADMIN_WEB_SOURCE_REPO,
              "admin-web": process.env.ADMIN_WEB_SOURCE_REPO,
              repo3: process.env.WORKER_SOURCE_REPO,
              worker: process.env.WORKER_SOURCE_REPO,
              repo4: process.env.COUNSELING_ANALYTICS_SOURCE_REPO,
              "counseling-analytics": process.env.COUNSELING_ANALYTICS_SOURCE_REPO
            };
            const sourceRepoRaw  = String(sourceRepoMap[sourceRepoSelector] || "").trim();
            const [owner, repo]  = sourceRepoRaw.split("/");
            const tag            = process.env.VERSION_TAG;
            const targetSha      = process.env.TARGET_SHA;
            const releaseLabel   = process.env.RELEASE_LABEL;
            const tagNamespace   = String(process.env.TAG_NAMESPACE || "").trim();
            const deployLabels = [];
            if (String(process.env.DEPLOY_API_SERVER) === "true") deployLabels.push("deploy:api-server");
            if (String(process.env.DEPLOY_ADMIN_WEB) === "true") deployLabels.push("deploy:admin-web");
            if (String(process.env.DEPLOY_CUSTOMER_WEB) === "true") deployLabels.push("deploy:customer-web");
            if (String(process.env.DEPLOY_WORKER) === "true") deployLabels.push("deploy:worker");
            if (String(process.env.DEPLOY_COUNSELING_ANALYTICS) === "true") deployLabels.push("deploy:counseling-analytics");
            if (String(process.env.DEPLOY_RECOMMENDATION_REALTIME) === "true") deployLabels.push("deploy:recommendation-realtime");
            if (String(process.env.DEPLOY_COUNSELING_BATCH) === "true") deployLabels.push("deploy:counseling-batch");

            if (!owner || !repo) {
              throw new Error(`invalid source repo. source_repo_selector=${sourceRepoSelector}, resolved=${sourceRepoRaw}`);
            }

            try {
              const existing = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
            
              core.notice(`Release already exists: ${existing.data.html_url}`);
              return;
            } catch (e) {
              if (e.status !== 404) throw e;
            }

            const header = [
              `release-label: ${releaseLabel}`,
              `tag-namespace: ${tagNamespace || "global"}`,
              `deploy-labels: ${deployLabels.join(", ") || "none"}`
            ].join("\n");

            const createReleasePayload = {
              owner,
              repo,
              tag_name:         tag,
              target_commitish: targetSha,
              name:             `${tag}`,
              body:             header,
              draft:            false,
              prerelease:       false,
              generate_release_notes: true
            };

            let created = null;
            for (let attempt = 1; attempt <= 3; attempt++) {
              try {
                created = await github.rest.repos.createRelease(createReleasePayload);
                break;
              } catch (e) {
                const message = String(e.message || "");
                const shouldRetry =
                  (typeof e.status === "number" && e.status >= 500) ||
                  /fetch failed|ECONNRESET|socket hang up|timed out/i.test(message);

                try {
                  const existingAfterFailure = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
                  core.notice(`Release became available after createRelease error: ${existingAfterFailure.data.html_url}`);
                  return;
                } catch (lookupError) {
                  if (lookupError.status !== 404) {
                    core.warning(`getReleaseByTag after failure also failed: ${lookupError.message}`);
                  }
                }

                if (!shouldRetry || attempt === 3) {
                  throw e;
                }

                core.warning(`createRelease attempt ${attempt} failed: ${message}. Retrying...`);
                await sleep(attempt * 2000);
              }
            }

            core.info(`Created release: ${created.data.html_url}`);

  build-and-push-api-server:
    runs-on: ubuntu-latest
    needs: [resolve-context, create-tag]
    if: needs.resolve-context.outputs.deploy_api_server == 'true'
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: holliverse
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d holliverse"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - name: Resolve api-server source repository
        id: resolve-api-repo
        shell: bash
        env:
          SOURCE_REPO_CODE: ${{ needs.resolve-context.outputs.source_repo_code }}
          DEFAULT_REPO: ${{ env.API_SERVER_SOURCE_REPO }}
        run: |
          set -euo pipefail
          if [[ "${SOURCE_REPO_CODE}" == "repo1" ]]; then
            echo "repo=$DEFAULT_REPO" >> "$GITHUB_OUTPUT"
          else
            echo "repo=$DEFAULT_REPO" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout api-server
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.resolve-api-repo.outputs.repo }}
          token: ${{ secrets.CENTRAL_REPO_TOKEN }}
          fetch-depth: 0

      - name: Checkout source sha if source repo is api-server
        if: needs.resolve-context.outputs.source_sha != ''
        shell: bash
        env:
          SOURCE_REPO_CODE: ${{ needs.resolve-context.outputs.source_repo_code }}
          SOURCE_SHA: ${{ needs.resolve-context.outputs.source_sha }}
        run: |
          set -euo pipefail
          if [[ "${SOURCE_REPO_CODE}" == "repo1" ]]; then
            git checkout "$SOURCE_SHA"
          fi

      - name: Initialize CI postgres roles for api-server build
        shell: bash
        env:
          POSTGRES_CONTAINER_ID: ${{ job.services.postgres.id }}
        run: |
          set -euo pipefail

          if [ ! -f docker/postgres/init/01-create-app-roles.sql ]; then
            echo "::error::Missing docker/postgres/init/01-create-app-roles.sql in api-server repository"
            exit 1
          fi

          docker exec -i "$POSTGRES_CONTAINER_ID" \
            psql -U postgres -d holliverse \
            < docker/postgres/init/01-create-app-roles.sql

      - name: Patch api-server Dockerfile for CI database access
        shell: bash
        run: |
          set -euo pipefail

          if grep -q '^ARG DB_URL=' Dockerfile; then
            echo "Dockerfile already exposes build-time DB arguments."
            exit 0
          fi

          perl -0pi -e 's/FROM eclipse-temurin:17-jdk AS builder/FROM eclipse-temurin:17-jdk AS builder\nARG DB_URL=jdbc:\/\/postgresql:\/\/host.docker.internal:5432\/holliverse\nARG DB_USER_ADMIN=postgres\nARG DB_PASS_ADMIN=postgres\nARG FLYWAY_USER=postgres\nARG FLYWAY_PASSWORD=postgres\nENV DB_URL=\${DB_URL} DB_USER_ADMIN=\${DB_USER_ADMIN} DB_PASS_ADMIN=\${DB_PASS_ADMIN} FLYWAY_USER=\${FLYWAY_USER} FLYWAY_PASSWORD=\${FLYWAY_PASSWORD}/' Dockerfile

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API images
        shell: bash
        env:
          VERSION_TAG: ${{ needs.create-tag.outputs.version_tag }}
        run: |
          set -euo pipefail

          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          REGISTRY="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          REPO="${REGISTRY}/${API_SERVER_REPOSITORY}"
          CUSTOMER_TAG="customer-${VERSION_TAG}"
          ADMIN_TAG="admin-${VERSION_TAG}"
          common_build_args=(
            --platform linux/amd64
            --add-host=host.docker.internal:host-gateway
            --build-arg DB_URL=jdbc:postgresql://host.docker.internal:5432/holliverse
            --build-arg DB_USER_ADMIN=postgres
            --build-arg DB_PASS_ADMIN=postgres
            --build-arg FLYWAY_USER=postgres
            --build-arg FLYWAY_PASSWORD=postgres
          )

          if aws ecr describe-images --repository-name "${API_SERVER_REPOSITORY}" --image-ids imageTag="${CUSTOMER_TAG}" >/dev/null 2>&1; then
            echo "Skip push: ${REPO}:${CUSTOMER_TAG} already exists."
          else
            docker build "${common_build_args[@]}" \
              --build-arg PROFILE=customer \
              -t "${REPO}:${CUSTOMER_TAG}" \
              .
            docker push "${REPO}:${CUSTOMER_TAG}"
          fi

          if aws ecr describe-images --repository-name "${API_SERVER_REPOSITORY}" --image-ids imageTag="${ADMIN_TAG}" >/dev/null 2>&1; then
            echo "Skip push: ${REPO}:${ADMIN_TAG} already exists."
          else
            docker build "${common_build_args[@]}" \
              --build-arg PROFILE=admin \
              -t "${REPO}:${ADMIN_TAG}" \
              .
            docker push "${REPO}:${ADMIN_TAG}"
          fi

  build-and-push-admin-web:
    runs-on: ubuntu-latest
    needs: [resolve-context, create-tag]
    if: needs.resolve-context.outputs.deploy_admin_web == 'true'
    steps:
      - name: Resolve admin-web source repository
        id: resolve-admin-repo
        shell: bash
        env:
          SOURCE_REPO_CODE: ${{ needs.resolve-context.outputs.source_repo_code }}
          DEFAULT_REPO: ${{ env.ADMIN_WEB_SOURCE_REPO }}
        run: |
          set -euo pipefail
          if [[ "${SOURCE_REPO_CODE}" == "repo2" ]]; then
            echo "repo=$DEFAULT_REPO" >> "$GITHUB_OUTPUT"
          else
            echo "repo=$DEFAULT_REPO" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout admin-web
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.resolve-admin-repo.outputs.repo }}
          token: ${{ secrets.CENTRAL_REPO_TOKEN }}
          fetch-depth: 0

      - name: Checkout source sha if source repo is admin-web
        if: needs.resolve-context.outputs.source_sha != ''
        shell: bash
        env:
          SOURCE_REPO_CODE: ${{ needs.resolve-context.outputs.source_repo_code }}
          SOURCE_SHA: ${{ needs.resolve-context.outputs.source_sha }}
        run: |
          set -euo pipefail
          if [[ "${SOURCE_REPO_CODE}" == "repo2" ]]; then
            git checkout "$SOURCE_SHA"
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Admin Web image
        shell: bash
        env:
          VERSION_TAG: ${{ needs.create-tag.outputs.version_tag }}
        run: |
          set -euo pipefail

          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          REGISTRY="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          REPO="${REGISTRY}/${ADMIN_WEB_REPOSITORY}"
          if aws ecr describe-images --repository-name "${ADMIN_WEB_REPOSITORY}" --image-ids imageTag="${VERSION_TAG}" >/dev/null 2>&1; then
            echo "Skip push: ${REPO}:${VERSION_TAG} already exists."
          else
            docker build --platform linux/amd64 \
              -t "${REPO}:${VERSION_TAG}" \
              .
            docker push "${REPO}:${VERSION_TAG}"
          fi


  build-and-push-worker:
    runs-on: ubuntu-latest
    needs: [resolve-context, create-tag]
    if: needs.resolve-context.outputs.deploy_worker == 'true'
    steps:
      - name: Resolve worker ECR repository
        id: resolve-worker-ecr-repo
        shell: bash
        run: |
          set -euo pipefail
          worker_repository="${WORKER_REPOSITORY:-${WORKER_SOURCE_REPO:-}}"
          if [ -z "$worker_repository" ]; then
            echo "::error::WORKER_REPOSITORY secret is empty and WORKER_SOURCE_REPO fallback is unavailable"
            exit 1
          fi
          echo "worker_repository=$worker_repository" >> "$GITHUB_OUTPUT"

      - name: Resolve worker source repository
        id: resolve-worker-repo
        shell: bash
        env:
          SOURCE_REPO_CODE: ${{ needs.resolve-context.outputs.source_repo_code }}
          DEFAULT_REPO: ${{ env.WORKER_SOURCE_REPO }}
        run: |
          set -euo pipefail
          if [[ "${SOURCE_REPO_CODE}" == "repo3" ]]; then
            echo "repo=$DEFAULT_REPO" >> "$GITHUB_OUTPUT"
          else
            echo "repo=$DEFAULT_REPO" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout worker
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.resolve-worker-repo.outputs.repo }}
          token: ${{ secrets.CENTRAL_REPO_TOKEN }}
          fetch-depth: 0

      - name: Checkout source sha if source repo is worker
        if: needs.resolve-context.outputs.source_sha != ''
        shell: bash
        env:
          SOURCE_REPO_CODE: ${{ needs.resolve-context.outputs.source_repo_code }}
          SOURCE_SHA: ${{ needs.resolve-context.outputs.source_sha }}
        run: |
          set -euo pipefail
          if [[ "${SOURCE_REPO_CODE}" == "repo3" ]]; then
            git checkout "$SOURCE_SHA"
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Worker image
        shell: bash
        env:
          VERSION_TAG: ${{ needs.create-tag.outputs.version_tag }}
          WORKER_REPOSITORY_RESOLVED: ${{ steps.resolve-worker-ecr-repo.outputs.worker_repository }}
        run: |
          set -euo pipefail

          worker_repository="${WORKER_REPOSITORY_RESOLVED}"
          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          REGISTRY="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          REPO="${REGISTRY}/${worker_repository}"
          WORKER_TAG="worker-${VERSION_TAG}"

          if ! aws ecr describe-repositories --repository-names "${worker_repository}" >/dev/null 2>&1; then
            echo "Create ECR repository: ${worker_repository}"
            aws ecr create-repository --repository-name "${worker_repository}" >/dev/null
          fi

          if aws ecr describe-images --repository-name "${worker_repository}" --image-ids imageTag="${WORKER_TAG}" >/dev/null 2>&1; then
            echo "Skip push: ${REPO}:${WORKER_TAG} already exists."
          else
            docker build --platform linux/amd64 \
              -t "${REPO}:${WORKER_TAG}" \
              .
            docker push "${REPO}:${WORKER_TAG}"
          fi


  build-and-push-counseling-analytics:
    runs-on: ubuntu-latest
    needs: [resolve-context, create-tag]
    if: |
      needs.resolve-context.outputs.deploy_recommendation_realtime == 'true' ||
      needs.resolve-context.outputs.deploy_counseling_batch == 'true'
    steps:
      - name: Validate counseling analytics repository secret
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${COUNSELING_ANALYTICS_REPOSITORY:-}" ]; then
            echo "::error::COUNSELING_ANALYTICS_REPOSITORY secret is required for deploy:recommendation-server or deploy:analysis-server"
            exit 1
          fi

      - name: Resolve counseling analytics source repository
        id: resolve-counseling-repo
        shell: bash
        env:
          SOURCE_REPO_CODE: ${{ needs.resolve-context.outputs.source_repo_code }}
          DEFAULT_REPO: ${{ env.COUNSELING_ANALYTICS_SOURCE_REPO }}
        run: |
          set -euo pipefail
          if [[ "${SOURCE_REPO_CODE}" == "repo4" ]]; then
            echo "repo=$DEFAULT_REPO" >> "$GITHUB_OUTPUT"
          else
            echo "repo=$DEFAULT_REPO" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout counseling analytics
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.resolve-counseling-repo.outputs.repo }}
          token: ${{ secrets.CENTRAL_REPO_TOKEN }}
          fetch-depth: 0

      - name: Checkout source sha if source repo is counseling-analytics
        if: needs.resolve-context.outputs.source_sha != ''
        shell: bash
        env:
          SOURCE_REPO_CODE: ${{ needs.resolve-context.outputs.source_repo_code }}
          SOURCE_SHA: ${{ needs.resolve-context.outputs.source_sha }}
        run: |
          set -euo pipefail
          if [[ "${SOURCE_REPO_CODE}" == "repo4" ]]; then
            git checkout "$SOURCE_SHA"
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push counseling analytics image
        shell: bash
        env:
          VERSION_TAG: ${{ needs.create-tag.outputs.version_tag }}
        run: |
          set -euo pipefail

          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          REGISTRY="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          REPO="${REGISTRY}/${COUNSELING_ANALYTICS_REPOSITORY}"
          IMAGE_TAG="counseling-analytics-${VERSION_TAG}"

          if ! aws ecr describe-repositories --repository-names "${COUNSELING_ANALYTICS_REPOSITORY}" >/dev/null 2>&1; then
            echo "Create ECR repository: ${COUNSELING_ANALYTICS_REPOSITORY}"
            aws ecr create-repository --repository-name "${COUNSELING_ANALYTICS_REPOSITORY}" >/dev/null
          fi

          if aws ecr describe-images --repository-name "${COUNSELING_ANALYTICS_REPOSITORY}" --image-ids imageTag="${IMAGE_TAG}" >/dev/null 2>&1; then
            echo "Skip push: ${REPO}:${IMAGE_TAG} already exists."
          else
            docker build --platform linux/amd64               -t "${REPO}:${IMAGE_TAG}"               .
            docker push "${REPO}:${IMAGE_TAG}"
          fi

  deploy-ecs:
    runs-on: ubuntu-latest
    needs:
      - resolve-context
      - create-tag
      - create-github-release
      - build-and-push-api-server
      - build-and-push-admin-web
      - build-and-push-worker
      - build-and-push-counseling-analytics

    if: |
      always() &&
      needs.resolve-context.result == 'success' &&
      needs.create-tag.result == 'success' &&
      needs.create-github-release.result == 'success' &&
      (needs.build-and-push-api-server.result == 'success' || needs.build-and-push-api-server.result == 'skipped') &&
      (needs.build-and-push-admin-web.result == 'success' || needs.build-and-push-admin-web.result == 'skipped') &&
      (needs.build-and-push-worker.result == 'success' || needs.build-and-push-worker.result == 'skipped') &&
      (needs.build-and-push-counseling-analytics.result == 'success' || needs.build-and-push-counseling-analytics.result == 'skipped') &&
      (
        needs.resolve-context.outputs.deploy_api_server == 'true' ||
        needs.resolve-context.outputs.deploy_admin_web == 'true' ||
        needs.resolve-context.outputs.deploy_customer_web == 'true' ||
        needs.resolve-context.outputs.deploy_recommendation_realtime == 'true'
      )
    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install CDK CLI
        run: npm install -g aws-cdk@latest

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy ECS stack (image rollout)
        id: deploy-ecs
        shell: bash
        working-directory: infrastructure
        env:
          DEPLOY_MODE: ecs
          RELEASE_TAG: ${{ needs.create-tag.outputs.version_tag }}
          DEPLOY_API_SERVER: ${{ needs.resolve-context.outputs.deploy_api_server }}
          DEPLOY_ADMIN_WEB: ${{ needs.resolve-context.outputs.deploy_admin_web }}
          DEPLOY_RECOMMENDATION_REALTIME: ${{ needs.resolve-context.outputs.deploy_recommendation_realtime }}
        run: |
          set -euo pipefail

          latest_ecr_tag_for_prefix() {
            local repository="$1"
            local prefix="$2"
            local fallback="$3"
            local tags=""
            local latest_tag=""

            if [ "${prefix}" = "${fallback}" ]; then
              fallback=""
            fi

            tags="$(aws ecr describe-images \
              --region "$AWS_REGION" \
              --repository-name "$repository" \
              --query 'reverse(sort_by(imageDetails[?imageTags!=null], &imagePushedAt))[].imageTags[]' \
              --output text 2>/dev/null || true)"

            if [ -n "$tags" ]; then
              latest_tag="$(printf '%s\n' "$tags" | tr '\t' '\n' | awk -v pfx="$prefix" '
                NF == 0 { next }
                pfx == "" { print; exit }
                index($0, pfx) == 1 { print; exit }
              ')"
            fi

            if [ -n "$latest_tag" ]; then
              echo "$latest_tag"
              return
            fi

            if [ -n "$fallback" ]; then
              echo "$fallback"
              return
            fi

            echo "::error::No image tag found in ECR repository=${repository} prefix=${prefix}" >&2
            exit 1
          }

          COUNSELING_ANALYTICS_ECR_REPOSITORY="${COUNSELING_ANALYTICS_REPOSITORY:-${COUNSELING_ANALYTICS_SOURCE_REPO}}"

          current_admin_web_tag="$(latest_ecr_tag_for_prefix "${ADMIN_WEB_REPOSITORY}" "" "latest")"
          current_admin_api_tag="$(latest_ecr_tag_for_prefix "${API_SERVER_REPOSITORY}" "admin-" "latest")"
          current_customer_api_tag="$(latest_ecr_tag_for_prefix "${API_SERVER_REPOSITORY}" "customer-" "latest")"
          current_recommendation_realtime_tag="$(latest_ecr_tag_for_prefix "${COUNSELING_ANALYTICS_ECR_REPOSITORY}" "counseling-analytics-" "latest")"

          ADMIN_WEB_IMAGE_TAG="$current_admin_web_tag"
          ADMIN_API_IMAGE_TAG="$current_admin_api_tag"
          CUSTOMER_API_IMAGE_TAG="$current_customer_api_tag"
          RECOMMENDATION_REALTIME_IMAGE_TAG="$current_recommendation_realtime_tag"

          if [ "${DEPLOY_ADMIN_WEB}" = "true" ]; then
            ADMIN_WEB_IMAGE_TAG="$RELEASE_TAG"
          fi

          if [ "${DEPLOY_API_SERVER}" = "true" ]; then
            ADMIN_API_IMAGE_TAG="admin-${RELEASE_TAG}"
            CUSTOMER_API_IMAGE_TAG="customer-${RELEASE_TAG}"
          fi

          if [ "${DEPLOY_RECOMMENDATION_REALTIME}" = "true" ]; then
            RECOMMENDATION_REALTIME_IMAGE_TAG="counseling-analytics-${RELEASE_TAG}"
          fi

          export ADMIN_WEB_IMAGE_TAG
          export ADMIN_API_IMAGE_TAG
          export CUSTOMER_API_IMAGE_TAG
          export RECOMMENDATION_REALTIME_IMAGE_TAG

          msk_cluster_name="$(aws cloudformation describe-stacks \
            --region "$AWS_REGION" \
            --stack-name MskStack \
            --query "Stacks[0].Outputs[?OutputKey=='MskClusterName'].OutputValue | [0]" \
            --output text 2>/dev/null || true)"
          msk_cluster_arn="$(aws cloudformation describe-stacks \
            --region "$AWS_REGION" \
            --stack-name MskStack \
            --query "Stacks[0].Outputs[?OutputKey=='MskClusterArn'].OutputValue | [0]" \
            --output text 2>/dev/null || true)"
          msk_bootstrap_brokers="$(aws cloudformation describe-stacks \
            --region "$AWS_REGION" \
            --stack-name MskStack \
            --query "Stacks[0].Outputs[?OutputKey=='MskBootstrapBrokersSaslIam'].OutputValue | [0]" \
            --output text 2>/dev/null || true)"

          if [ -z "$msk_cluster_name" ] || [ "$msk_cluster_name" = "None" ] \
            || [ -z "$msk_cluster_arn" ] || [ "$msk_cluster_arn" = "None" ] \
            || [ -z "$msk_bootstrap_brokers" ] || [ "$msk_bootstrap_brokers" = "None" ]; then
            echo "::error::Could not resolve provisioned MSK outputs from MskStack."
            exit 1
          fi

          echo "::add-mask::$msk_bootstrap_brokers"

          export ECS_MSK_CLUSTER_NAME_OVERRIDE="$msk_cluster_name"
          export ECS_MSK_CLUSTER_ARN_OVERRIDE="$msk_cluster_arn"
          export ECS_MSK_BOOTSTRAP_BROKERS_OVERRIDE="$msk_bootstrap_brokers"

          {
            echo "admin_web_image_tag=$ADMIN_WEB_IMAGE_TAG"
            echo "admin_api_image_tag=$ADMIN_API_IMAGE_TAG"
            echo "customer_api_image_tag=$CUSTOMER_API_IMAGE_TAG"
            echo "recommendation_realtime_image_tag=$RECOMMENDATION_REALTIME_IMAGE_TAG"
          } >> "$GITHUB_OUTPUT"

          cdk deploy EcsClusterStack --exclusively --require-approval never

      - name: Summary
        run: |
          echo "release=${{ needs.create-tag.outputs.version_tag }}"
          echo "deploy_api_server=${{ needs.resolve-context.outputs.deploy_api_server }}"
          echo "deploy_admin_web=${{ needs.resolve-context.outputs.deploy_admin_web }}"
          echo "deploy_customer_web=${{ needs.resolve-context.outputs.deploy_customer_web }}"
          echo "deploy_recommendation_realtime=${{ needs.resolve-context.outputs.deploy_recommendation_realtime }}"
          echo "deploy_counseling_batch=${{ needs.resolve-context.outputs.deploy_counseling_batch }}"
          echo "admin_api_image_tag=${{ steps.deploy-ecs.outputs.admin_api_image_tag }}"
          echo "customer_api_image_tag=${{ steps.deploy-ecs.outputs.customer_api_image_tag }}"
          echo "admin_web_image_tag=${{ steps.deploy-ecs.outputs.admin_web_image_tag }}"
          echo "recommendation_realtime_image_tag=${{ steps.deploy-ecs.outputs.recommendation_realtime_image_tag }}"

  run-worker-task:
    runs-on: ubuntu-latest
    needs:
      - resolve-context
      - create-tag
      - build-and-push-worker
      - deploy-ecs
    # deploy:worker 시 task definition revision은 항상 갱신하고,
    # CI 직접 실행은 CI_RUN_WORKER_TASK=true일 때만 추가로 수행한다.
    if: |
      always() &&
      needs.resolve-context.outputs.deploy_worker == 'true' &&
      needs.resolve-context.result == 'success' &&
      needs.create-tag.result == 'success' &&
      needs.build-and-push-worker.result == 'success' &&
      (needs.deploy-ecs.result == 'success' || needs.deploy-ecs.result == 'skipped')
    outputs:
      worker_task_arn: ${{ steps.run-task.outputs.worker_task_arn }}
      worker_task_definition: ${{ steps.run-task.outputs.worker_task_definition }}
      worker_image: ${{ steps.run-task.outputs.worker_image }}
      worker_cluster_name: ${{ steps.run-task.outputs.worker_cluster_name }}
      worker_container_name: ${{ steps.run-task.outputs.worker_container_name }}
      worker_started_by: ${{ steps.run-task.outputs.worker_started_by }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Register worker task definition revision and optionally run task
        id: run-task
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.create-tag.outputs.version_tag }}
          CI_RUN_WORKER_TASK: ${{ needs.resolve-context.outputs.ci_run_worker_task }}
        run: |
          set -euo pipefail

          worker_repository="${WORKER_REPOSITORY:-${WORKER_SOURCE_REPO:-}}"
          if [ -z "$worker_repository" ]; then
            echo "::error::WORKER_REPOSITORY secret is empty and WORKER_SOURCE_REPO fallback is unavailable"
            exit 1
          fi

          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          REGISTRY="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          WORKER_IMAGE="${REGISTRY}/${worker_repository}:worker-${RELEASE_TAG}"

          if ! aws ecr describe-images --repository-name "${worker_repository}" --image-ids imageTag="worker-${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "::error::Worker image does not exist: ${WORKER_IMAGE}"
            exit 1
          fi

          resolve_taskdef_from_family() {
            local family="$1"
            aws ecs list-task-definitions \
              --region "$AWS_REGION" \
              --family-prefix "$family" \
              --status ACTIVE \
              --sort DESC \
              --max-items 1 \
              --query 'taskDefinitionArns[0]' \
              --output text 2>/dev/null || true
          }

          resolve_taskdef_by_repo_scan() {
            local repo="$1"
            local candidate=""
            local images=""

            while read -r candidate; do
              [ -z "$candidate" ] && continue
              [ "$candidate" = "None" ] && continue

              images="$(aws ecs describe-task-definition \
                --region "$AWS_REGION" \
                --task-definition "$candidate" \
                --query 'taskDefinition.containerDefinitions[].image' \
                --output text 2>/dev/null || true)"

              if echo "$images" | tr '\t' '\n' | grep -Eq "/${repo}(:|@)"; then
                echo "$candidate"
                return
              fi
            done < <(aws ecs list-task-definitions \
              --region "$AWS_REGION" \
              --status ACTIVE \
              --sort DESC \
              --max-items 200 \
              --query 'taskDefinitionArns' \
              --output text | tr '\t' '\n')

            echo ""
          }

          resolve_taskdef_from_service_template() {
            local service_rows=""
            local service_arn=""
            local service_cluster=""
            local service_name=""
            local taskdef=""

            service_rows="$(aws cloudformation describe-stack-resources \
              --region "$AWS_REGION" \
              --stack-name EcsClusterStack \
              --query "StackResources[?ResourceType=='AWS::ECS::Service'].[LogicalResourceId,PhysicalResourceId]" \
              --output text 2>/dev/null || true)"

            service_arn="$(echo "$service_rows" | awk '$1 ~ /^CustomerApiService/ {print $2; exit}')"
            if [ -z "$service_arn" ] || [ "$service_arn" = "None" ]; then
              service_arn="$(echo "$service_rows" | awk '$1 ~ /^AdminApiService/ {print $2; exit}')"
            fi
            if [ -z "$service_arn" ] || [ "$service_arn" = "None" ]; then
              service_arn="$(echo "$service_rows" | awk 'NR==1 {print $2; exit}')"
            fi
            if [ -z "$service_arn" ] || [ "$service_arn" = "None" ]; then
              echo ""
              return
            fi

            service_cluster="$(echo "$service_arn" | awk -F'/' '{print $(NF-1)}')"
            service_name="$(echo "$service_arn" | awk -F'/' '{print $NF}')"

            taskdef="$(aws ecs describe-services \
              --region "$AWS_REGION" \
              --cluster "$service_cluster" \
              --services "$service_name" \
              --query 'services[0].taskDefinition' \
              --output text 2>/dev/null || true)"

            echo "$taskdef"
          }

          source_taskdef="${WORKER_TASK_DEFINITION_ARN:-}"
          if [ -z "$source_taskdef" ]; then
            if [ -n "${WORKER_TASK_DEFINITION_FAMILY:-}" ]; then
              source_taskdef="$(resolve_taskdef_from_family "$WORKER_TASK_DEFINITION_FAMILY")"
            fi
          fi

          if [ -z "$source_taskdef" ] || [ "$source_taskdef" = "None" ]; then
            echo "Try resolving worker task definition by image repository scan: ${worker_repository}"
            source_taskdef="$(resolve_taskdef_by_repo_scan "$worker_repository")"
          fi

          if [ -z "$source_taskdef" ] || [ "$source_taskdef" = "None" ]; then
            echo "Try resolving worker task definition from existing ECS service template"
            source_taskdef="$(resolve_taskdef_from_service_template)"
          fi

          if [ -z "$source_taskdef" ] || [ "$source_taskdef" = "None" ]; then
            echo "::error::Could not resolve worker task definition. Set WORKER_TASK_DEFINITION_ARN or WORKER_TASK_DEFINITION_FAMILY."
            exit 1
          fi

          container_name="${WORKER_CONTAINER_NAME:-worker}"

          taskdef_json="$(aws ecs describe-task-definition             --region "$AWS_REGION"             --task-definition "$source_taskdef"             --query 'taskDefinition'             --output json)"

          task_role_arn="$(echo "$taskdef_json" | jq -r '.taskRoleArn // empty')"
          if [ -z "$task_role_arn" ]; then
            echo "::error::Source worker task definition must define taskRoleArn for AWS_MSK_IAM authentication."
            exit 1
          fi

          effective_container_name="$container_name"
          if ! echo "$taskdef_json" | jq -e --arg cname "$container_name" 'any(.containerDefinitions[]; .name == $cname)' >/dev/null; then
            fallback_container_name="$(echo "$taskdef_json" | jq -r '.containerDefinitions[0].name // empty')"
            if [ -z "$fallback_container_name" ]; then
              echo "::error::Could not determine container name from source task definition."
              exit 1
            fi
            echo "Container '${container_name}' not found in source task definition. Use '${fallback_container_name}' as override target."
            effective_container_name="$fallback_container_name"
          fi

          new_taskdef_json="$(echo "$taskdef_json" | jq             --arg img "$WORKER_IMAGE"             --arg cname "$effective_container_name"             '
            .containerDefinitions |= (
              if any(.[]; .name == $cname)
              then map(if .name == $cname then .image = $img else . end)
              else (.[0].image = $img | .)
              end
            )
            | del(
                .taskDefinitionArn,
                .revision,
                .status,
                .requiresAttributes,
                .compatibilities,
                .registeredAt,
                .registeredBy
              )
            ' )"

          new_taskdef_arn="$(aws ecs register-task-definition             --region "$AWS_REGION"             --cli-input-json "$new_taskdef_json"             --query 'taskDefinition.taskDefinitionArn'             --output text)"

          if [ -z "$new_taskdef_arn" ] || [ "$new_taskdef_arn" = "None" ]; then
            echo "::error::Failed to register worker task definition revision."
            exit 1
          fi

          if [ "${CI_RUN_WORKER_TASK}" != "true" ]; then
            echo "Skip ecs run-task because CI_RUN_WORKER_TASK is not enabled. Registered worker task definition revision only."
            {
              echo "worker_image=$WORKER_IMAGE"
              echo "worker_task_definition=$new_taskdef_arn"
              echo "worker_task_arn="
              echo "worker_cluster_name="
              echo "worker_container_name=$effective_container_name"
              echo "worker_started_by="
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          cluster_name="${WORKER_CLUSTER_NAME:-}"
          if [ -z "$cluster_name" ]; then
            cluster_name="$(aws cloudformation describe-stack-resources               --region "$AWS_REGION"               --stack-name EcsClusterStack               --query "StackResources[?ResourceType=='AWS::ECS::Cluster']|[0].PhysicalResourceId"               --output text 2>/dev/null || true)"
          fi

          if [ -z "$cluster_name" ] || [ "$cluster_name" = "None" ]; then
            echo "::error::Could not resolve ECS cluster name for worker run-task."
            exit 1
          fi

          subnet_csv="${WORKER_SUBNET_IDS:-}"
          sg_csv="${WORKER_SECURITY_GROUP_IDS:-}"
          assign_public_ip="${WORKER_ASSIGN_PUBLIC_IP:-DISABLED}"

          if [ -z "$subnet_csv" ] || [ -z "$sg_csv" ]; then
            service_rows="$(aws cloudformation describe-stack-resources \
              --region "$AWS_REGION" \
              --stack-name EcsClusterStack \
              --query "StackResources[?ResourceType=='AWS::ECS::Service'].[LogicalResourceId,PhysicalResourceId]" \
              --output text 2>/dev/null || true)"

            service_arn="$(echo "$service_rows" | awk '$1 ~ /^CustomerApiService/ {print $2; exit}')"
            if [ -z "$service_arn" ] || [ "$service_arn" = "None" ]; then
              service_arn="$(echo "$service_rows" | awk '$1 ~ /^AdminApiService/ {print $2; exit}')"
            fi
            if [ -z "$service_arn" ] || [ "$service_arn" = "None" ]; then
              service_arn="$(echo "$service_rows" | awk 'NR==1 {print $2; exit}')"
            fi

            if [ -z "$service_arn" ] || [ "$service_arn" = "None" ]; then
              echo "::error::Could not infer network from ECS service. Set WORKER_SUBNET_IDS/WORKER_SECURITY_GROUP_IDS secrets."
              exit 1
            fi

            service_cluster="$(echo "$service_arn" | awk -F'/' '{print $(NF-1)}')"
            service_name="$(echo "$service_arn" | awk -F'/' '{print $NF}')"

            awsvpc_json="$(aws ecs describe-services               --region "$AWS_REGION"               --cluster "$service_cluster"               --services "$service_name"               --query 'services[0].networkConfiguration.awsvpcConfiguration'               --output json)"

            subnet_csv="$(echo "$awsvpc_json" | jq -r '.subnets | join(",")')"
            sg_csv="$(echo "$awsvpc_json" | jq -r '.securityGroups | join(",")')"
            inferred_assign_public_ip="$(echo "$awsvpc_json" | jq -r '.assignPublicIp // "DISABLED"')"

            if [ -z "${WORKER_ASSIGN_PUBLIC_IP:-}" ]; then
              assign_public_ip="$inferred_assign_public_ip"
            fi
          fi

          if [ -z "$subnet_csv" ] || [ "$subnet_csv" = "null" ] || [ -z "$sg_csv" ] || [ "$sg_csv" = "null" ]; then
            echo "::error::Invalid network config for worker run-task."
            exit 1
          fi

          assign_public_ip="$(echo "$assign_public_ip" | tr '[:lower:]' '[:upper:]')"
          if [ "$assign_public_ip" != "ENABLED" ] && [ "$assign_public_ip" != "DISABLED" ]; then
            assign_public_ip="DISABLED"
          fi

          run_started_by="worker-release-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

          msk_bootstrap_brokers="$(aws cloudformation describe-stacks \
            --region "$AWS_REGION" \
            --stack-name MskStack \
            --query "Stacks[0].Outputs[?OutputKey=='MskBootstrapBrokersSaslIam'].OutputValue | [0]" \
            --output text 2>/dev/null || true)"

          if [ -z "$msk_bootstrap_brokers" ] || [ "$msk_bootstrap_brokers" = "None" ]; then
            echo "::error::Could not resolve MSK bootstrap brokers from MskStack output."
            exit 1
          fi

          # 브로커 endpoint는 자격 증명은 아니지만, Actions 로그에서 우발적으로 드러나지 않도록 마스킹한다.
          echo "::add-mask::$msk_bootstrap_brokers"

          run_overrides="$(jq -cn \
            --arg cname "$effective_container_name" \
            --arg runId "${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
            --arg releaseTag "$RELEASE_TAG" \
            --arg mskBootstrapBrokers "$msk_bootstrap_brokers" \
            '{
              containerOverrides: [
                {
                  name: $cname,
                  environment: [
                    {name: "RUN_ID", value: $runId},
                    {name: "RELEASE_TAG", value: $releaseTag},
                    {name: "MSK_BOOTSTRAP_SERVERS", value: $mskBootstrapBrokers},
                    {name: "KAFKA_SECURITY_PROTOCOL", value: "SASL_SSL"},
                    {name: "KAFKA_SASL_MECHANISM", value: "AWS_MSK_IAM"},
                    {name: "KAFKA_SASL_JAAS_CONFIG", value: "software.amazon.msk.auth.iam.IAMLoginModule required;"},
                    {name: "KAFKA_SASL_CALLBACK_HANDLER_CLASS", value: "software.amazon.msk.auth.iam.IAMClientCallbackHandler"}
                  ]
                }
              ]
            }'
          )"

          run_result="$(aws ecs run-task             --region "$AWS_REGION"             --cluster "$cluster_name"             --launch-type FARGATE             --task-definition "$new_taskdef_arn"             --started-by "$run_started_by"             --overrides "$run_overrides"             --network-configuration "awsvpcConfiguration={subnets=[${subnet_csv}],securityGroups=[${sg_csv}],assignPublicIp=${assign_public_ip}}"             --query '{tasks:tasks[].taskArn,failures:failures}'             --output json)"

          echo "$run_result"

          failures_count="$(echo "$run_result" | jq '.failures | length')"
          if [ "$failures_count" -gt 0 ]; then
            echo "::error::ecs run-task failed: $run_result"
            exit 1
          fi

          task_arn="$(echo "$run_result" | jq -r '.tasks[0] // empty')"
          if [ -z "$task_arn" ]; then
            echo "::error::ecs run-task returned no task ARN"
            exit 1
          fi

          {
            echo "worker_image=$WORKER_IMAGE"
            echo "worker_task_definition=$new_taskdef_arn"
            echo "worker_task_arn=$task_arn"
            echo "worker_cluster_name=$cluster_name"
            echo "worker_container_name=$effective_container_name"
            echo "worker_started_by=$run_started_by"
          } >> "$GITHUB_OUTPUT"

      - name: Summary
        run: |
          echo "worker_image=${{ steps.run-task.outputs.worker_image }}"
          echo "worker_task_definition=${{ steps.run-task.outputs.worker_task_definition }}"
          echo "worker_task_arn=${{ steps.run-task.outputs.worker_task_arn }}"

  verify-worker-task:
    runs-on: ubuntu-latest
    needs:
      - resolve-context
      - run-worker-task
    if: |
      always() &&
      needs.resolve-context.outputs.ci_run_worker_task == 'true' &&
      needs.resolve-context.outputs.deploy_worker == 'true' &&
      needs.run-worker-task.result == 'success'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Wait worker task to stop and verify exit code
        shell: bash
        env:
          WORKER_TASK_ARN: ${{ needs.run-worker-task.outputs.worker_task_arn }}
          WORKER_CLUSTER_FROM_JOB: ${{ needs.run-worker-task.outputs.worker_cluster_name }}
          WORKER_CONTAINER_FROM_JOB: ${{ needs.run-worker-task.outputs.worker_container_name }}
          WORKER_STARTED_BY: ${{ needs.run-worker-task.outputs.worker_started_by }}
        run: |
          set -euo pipefail

          cluster_name="${WORKER_CLUSTER_FROM_JOB:-${WORKER_CLUSTER_NAME:-}}"
          if [ -z "$cluster_name" ]; then
            cluster_name="$(echo "$WORKER_TASK_ARN" | awk -F'/' '{print $(NF-1)}')"
          fi
          if [ -z "$cluster_name" ]; then
            echo "::error::Could not resolve worker cluster name"
            exit 1
          fi

          if [ -z "${WORKER_TASK_ARN:-}" ] && [ -n "${WORKER_STARTED_BY:-}" ]; then
            echo "Resolve worker task ARN via startedBy=${WORKER_STARTED_BY}"
            WORKER_TASK_ARN="$(aws ecs list-tasks \
              --region "$AWS_REGION" \
              --cluster "$cluster_name" \
              --started-by "$WORKER_STARTED_BY" \
              --desired-status RUNNING \
              --query 'taskArns[0]' \
              --output text 2>/dev/null || true)"

            if [ -z "$WORKER_TASK_ARN" ] || [ "$WORKER_TASK_ARN" = "None" ]; then
              WORKER_TASK_ARN="$(aws ecs list-tasks \
                --region "$AWS_REGION" \
                --cluster "$cluster_name" \
                --started-by "$WORKER_STARTED_BY" \
                --desired-status STOPPED \
                --query 'taskArns[0]' \
                --output text 2>/dev/null || true)"
            fi
          fi

          if [ -z "${WORKER_TASK_ARN:-}" ] || [ "${WORKER_TASK_ARN}" = "None" ]; then
            echo "::error::Missing worker task arn"
            exit 1
          fi

          container_name="${WORKER_CONTAINER_FROM_JOB:-${WORKER_CONTAINER_NAME:-worker}}"

          max_attempts=180
          poll_seconds=10
          task_desc=""
          for ((i=1; i<=max_attempts; i++)); do
            task_desc="$(aws ecs describe-tasks \
              --region "$AWS_REGION" \
              --cluster "$cluster_name" \
              --tasks "$WORKER_TASK_ARN" \
              --query 'tasks[0]' \
              --output json)"

            last_status="$(echo "$task_desc" | jq -r '.lastStatus // "UNKNOWN"')"
            echo "[$i/$max_attempts] worker task status=${last_status}"

            if [ "$last_status" = "STOPPED" ]; then
              break
            fi

            sleep "$poll_seconds"
          done

          final_status="$(echo "$task_desc" | jq -r '.lastStatus // "UNKNOWN"')"
          if [ "$final_status" != "STOPPED" ]; then
            echo "::error::Timed out waiting worker task to stop"
            exit 1
          fi

          exit_code="$(echo "$task_desc" | jq -r --arg cname "$container_name" '([.containers[] | select(.name == $cname) | .exitCode][0] // .containers[0].exitCode // "")')"
          stop_code="$(echo "$task_desc" | jq -r '.stopCode // ""')"
          stopped_reason="$(echo "$task_desc" | jq -r '.stoppedReason // ""')"

          echo "worker_task_exit_code=${exit_code}"
          echo "worker_task_stop_code=${stop_code}"
          echo "worker_task_stopped_reason=${stopped_reason}"

          if [ -z "$exit_code" ] || [ "$exit_code" != "0" ]; then
            echo "::error::Worker task failed. exitCode=${exit_code:-none}, stopCode=${stop_code}, reason=${stopped_reason}"
            exit 1
          fi

  deploy-counseling-analytics-service:
    runs-on: ubuntu-latest
    needs:
      - resolve-context
      - create-tag
      - build-and-push-counseling-analytics
      - deploy-ecs
    if: |
      always() &&
      needs.resolve-context.outputs.deploy_recommendation_realtime == 'true' &&
      needs.resolve-context.outputs.can_deploy_counseling_service == 'true' &&
      needs.resolve-context.result == 'success' &&
      needs.create-tag.result == 'success' &&
      needs.build-and-push-counseling-analytics.result == 'success' &&
      (needs.deploy-ecs.result == 'success' || needs.deploy-ecs.result == 'skipped')
    outputs:
      counseling_service_name: ${{ steps.deploy-service.outputs.counseling_service_name }}
      counseling_task_definition: ${{ steps.deploy-service.outputs.counseling_task_definition }}
      counseling_image: ${{ steps.deploy-service.outputs.counseling_image }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Register task definition revision and update counseling analytics service
        id: deploy-service
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.create-tag.outputs.version_tag }}
        run: |
          set -euo pipefail

          normalize_aws_text_scalar() {
            printf '%s\n' "$1" | tr '\t' '\n' | awk 'NF && $0 != "None" { print; exit }'
          }

          if [ -z "${COUNSELING_ANALYTICS_REPOSITORY:-}" ]; then
            echo "::error::COUNSELING_ANALYTICS_REPOSITORY secret is required"
            exit 1
          fi
          if [ -z "${COUNSELING_ANALYTICS_CLUSTER_NAME:-}" ]; then
            echo "::error::COUNSELING_ANALYTICS_CLUSTER_NAME secret is required"
            exit 1
          fi
          if [ -z "${COUNSELING_ANALYTICS_SERVICE_NAME:-}" ]; then
            echo "::error::COUNSELING_ANALYTICS_SERVICE_NAME secret is required"
            exit 1
          fi

          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          REGISTRY="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          IMAGE_URI="${REGISTRY}/${COUNSELING_ANALYTICS_REPOSITORY}:counseling-analytics-${RELEASE_TAG}"

          source_taskdef="${COUNSELING_ANALYTICS_TASK_DEFINITION_ARN:-}"
          if [ -z "$source_taskdef" ]; then
            if [ -z "${COUNSELING_ANALYTICS_TASK_DEFINITION_FAMILY:-}" ]; then
              echo "::error::Set COUNSELING_ANALYTICS_TASK_DEFINITION_ARN or COUNSELING_ANALYTICS_TASK_DEFINITION_FAMILY"
              exit 1
            fi
            source_taskdef="$(aws ecs list-task-definitions               --region "$AWS_REGION"               --family-prefix "$COUNSELING_ANALYTICS_TASK_DEFINITION_FAMILY"               --sort DESC               --max-items 1               --query 'taskDefinitionArns[0]'               --output text 2>/dev/null || true)"
          fi
          source_taskdef="$(normalize_aws_text_scalar "$source_taskdef")"

          if [ -z "$source_taskdef" ] || [ "$source_taskdef" = "None" ]; then
            echo "::error::Could not resolve task definition for counseling analytics"
            exit 1
          fi

          container_name="${COUNSELING_ANALYTICS_CONTAINER_NAME:-counseling-analytics}"

          taskdef_json="$(aws ecs describe-task-definition             --region "$AWS_REGION"             --task-definition "$source_taskdef"             --query 'taskDefinition'             --output json)"

          new_taskdef_json="$(echo "$taskdef_json" | jq             --arg img "$IMAGE_URI"             --arg cname "$container_name"             '
            .containerDefinitions |= (
              if any(.[]; .name == $cname)
              then map(if .name == $cname then .image = $img else . end)
              else (.[0].image = $img | .)
              end
            )
            | del(
                .taskDefinitionArn,
                .revision,
                .status,
                .requiresAttributes,
                .compatibilities,
                .registeredAt,
                .registeredBy
              )
            ' )"

          new_taskdef_arn="$(aws ecs register-task-definition             --region "$AWS_REGION"             --cli-input-json "$new_taskdef_json"             --query 'taskDefinition.taskDefinitionArn'             --output text)"
          new_taskdef_arn="$(normalize_aws_text_scalar "$new_taskdef_arn")"

          if [ -z "$new_taskdef_arn" ] || [ "$new_taskdef_arn" = "None" ]; then
            echo "::error::Failed to register task definition revision"
            exit 1
          fi

          aws ecs update-service             --region "$AWS_REGION"             --cluster "$COUNSELING_ANALYTICS_CLUSTER_NAME"             --service "$COUNSELING_ANALYTICS_SERVICE_NAME"             --task-definition "$new_taskdef_arn"             --force-new-deployment >/dev/null

          aws ecs wait services-stable             --region "$AWS_REGION"             --cluster "$COUNSELING_ANALYTICS_CLUSTER_NAME"             --services "$COUNSELING_ANALYTICS_SERVICE_NAME"

          {
            echo "counseling_service_name=$COUNSELING_ANALYTICS_SERVICE_NAME"
            echo "counseling_task_definition=$new_taskdef_arn"
            echo "counseling_image=$IMAGE_URI"
          } >> "$GITHUB_OUTPUT"

      - name: Summary
        run: |
          echo "service=${{ steps.deploy-service.outputs.counseling_service_name }}"
          echo "task_definition=${{ steps.deploy-service.outputs.counseling_task_definition }}"
          echo "image=${{ steps.deploy-service.outputs.counseling_image }}"

  register-counseling-analytics-batch-task-definition:
    runs-on: ubuntu-latest
    needs:
      - resolve-context
      - create-tag
      - create-github-release
      - build-and-push-counseling-analytics
    if: |
      always() &&
      needs.resolve-context.outputs.deploy_counseling_batch == 'true' &&
      needs.resolve-context.outputs.deploy_recommendation_realtime != 'true' &&
      needs.resolve-context.result == 'success' &&
      needs.create-tag.result == 'success' &&
      needs.create-github-release.result == 'success' &&
      needs.build-and-push-counseling-analytics.result == 'success'
    outputs:
      counseling_batch_task_definition: ${{ steps.register-taskdef.outputs.counseling_batch_task_definition }}
      counseling_batch_image: ${{ steps.register-taskdef.outputs.counseling_batch_image }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Register task definition revision for analysis batch
        id: register-taskdef
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.create-tag.outputs.version_tag }}
        run: |
          set -euo pipefail

          normalize_aws_text_scalar() {
            printf '%s\n' "$1" | tr '\t' '\n' | awk 'NF && $0 != "None" { print; exit }'
          }

          if [ -z "${COUNSELING_ANALYTICS_REPOSITORY:-}" ]; then
            echo "::error::COUNSELING_ANALYTICS_REPOSITORY secret is required"
            exit 1
          fi

          source_taskdef="${COUNSELING_ANALYTICS_TASK_DEFINITION_ARN:-}"
          if [ -z "$source_taskdef" ]; then
            if [ -z "${COUNSELING_ANALYTICS_TASK_DEFINITION_FAMILY:-}" ]; then
              echo "::error::Set COUNSELING_ANALYTICS_TASK_DEFINITION_ARN or COUNSELING_ANALYTICS_TASK_DEFINITION_FAMILY"
              exit 1
            fi
            source_taskdef="$(aws ecs list-task-definitions \
              --region "$AWS_REGION" \
              --family-prefix "$COUNSELING_ANALYTICS_TASK_DEFINITION_FAMILY" \
              --sort DESC \
              --max-items 1 \
              --query 'taskDefinitionArns[0]' \
              --output text 2>/dev/null || true)"
          fi
          source_taskdef="$(normalize_aws_text_scalar "$source_taskdef")"

          if [ -z "$source_taskdef" ] || [ "$source_taskdef" = "None" ]; then
            echo "::error::Could not resolve task definition for analysis batch"
            exit 1
          fi

          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          REGISTRY="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          IMAGE_URI="${REGISTRY}/${COUNSELING_ANALYTICS_REPOSITORY}:counseling-analytics-${RELEASE_TAG}"
          container_name="${COUNSELING_ANALYTICS_CONTAINER_NAME:-MainContainer}"

          taskdef_json="$(aws ecs describe-task-definition \
            --region "$AWS_REGION" \
            --task-definition "$source_taskdef" \
            --query 'taskDefinition' \
            --output json)"

          new_taskdef_json="$(echo "$taskdef_json" | jq \
            --arg img "$IMAGE_URI" \
            --arg cname "$container_name" \
            '
            .containerDefinitions |= (
              if any(.[]; .name == $cname)
              then map(if .name == $cname then .image = $img else . end)
              else (.[0].image = $img | .)
              end
            )
            | del(
                .taskDefinitionArn,
                .revision,
                .status,
                .requiresAttributes,
                .compatibilities,
                .registeredAt,
                .registeredBy
              )
            ' )"

          new_taskdef_arn="$(aws ecs register-task-definition \
            --region "$AWS_REGION" \
            --cli-input-json "$new_taskdef_json" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)"
          new_taskdef_arn="$(normalize_aws_text_scalar "$new_taskdef_arn")"

          if [ -z "$new_taskdef_arn" ] || [ "$new_taskdef_arn" = "None" ]; then
            echo "::error::Failed to register analysis batch task definition revision"
            exit 1
          fi

          {
            echo "counseling_batch_task_definition=$new_taskdef_arn"
            echo "counseling_batch_image=$IMAGE_URI"
          } >> "$GITHUB_OUTPUT"

      - name: Summary
        run: |
          echo "analysis_batch_task_definition=${{ steps.register-taskdef.outputs.counseling_batch_task_definition }}"
          echo "analysis_batch_image=${{ steps.register-taskdef.outputs.counseling_batch_image }}"
